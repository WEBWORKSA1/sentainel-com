summary: |
  MFIPPA governs the collection, use, disclosure, and protection of
  personal information by Ontario municipal institutions: municipal
  corporations, local boards, police services boards, public library
  boards, boards of health, school boards (in some respects),
  conservation authorities, and transit commissions.

  Bill 97 (April 23, 2026) transformed MFIPPA from a static access-
  to-information statute into an active privacy governance regime
  aligned with FIPPA's 2025 amendments. Most consequentially for AI:
  mandatory Privacy Impact Assessments before collecting personal
  information, mandatory breach notification, and IPC binding-order
  authority — all starting January 1, 2027.

  For municipal AI deployment, MFIPPA Bill 97 is the operational
  spine. Every AI tool processing resident data triggers PIA
  obligations. Combined with the Ontario Human Rights Code (Code
  primacy, uncapped discrimination damages) and the pending EDSTA
  regulations, MFIPPA forms the core of Ontario's municipal AI
  compliance stack.
scope_description: |
  Applies to MFIPPA institutions as defined in s. 2(1):
  - Every municipality
  - A school board, conservation authority, board of health, board
    of commissioners of police, transit commission, public library
    board, or other local board as defined in the Municipal Affairs
    Act
  - Any agency, board, commission, corporation, or other body
    designated as an institution in the regulations

  Geography-based: applies to any institution operating in Ontario
  regardless of where headquartered. Captures shared services agencies
  serving multiple municipalities.
extraterritorial_reach: false
extraterritorial_notes: |
  MFIPPA itself is municipally scoped. However, vendor flow-down
  obligations from MFIPPA institutions reach private-sector AI
  vendors regardless of vendor location. A US-based SaaS company
  selling AI to Toronto City Hall is contractually bound by MFIPPA-
  derived requirements even though MFIPPA does not directly apply.
safe_harbor_via: []
notes: |
  MFIPPA has NO statutory affirmative defense for AI compliance.
  Like Bill 149, the regime is disclosure-and-process based, not
  risk-based. NIST AI RMF alignment helps defend parallel Code
  complaints but does not provide statutory protection under MFIPPA.

  The Code has PRIMACY over MFIPPA. Discriminatory AI outcomes
  trigger uncapped Code damages regardless of MFIPPA compliance.
