safe_harbor_notes: |
  PHIPA does not contain a statutory affirmative defense for AI.
  However, the IPC's AI Scribe Guidance explicitly recommends
  alignment with NIST AI Risk Management Framework:
  "An AI Risk Management Framework can assist custodians in
  evaluating and monitoring risks related to AI systems across
  their lifecycles."

  This is the strongest practitioner-recognized safe harbor in
  Canadian health privacy law. A HIC that aligns its AI
  governance with NIST AI RMF GOVERN and MEASURE functions has
  the best available defense against IPC enforcement.

  Sentainel positioning: "Your NIST AI RMF documentation is
  also your PHIPA defense. IPC inspections look for the same
  controls."
notes: |
  - The IPC has TEETH that EDSTA lacks. PHIPA s. 61.1 AMPs
    ($50K/$500K) plus s. 72 criminal ($200K/$1M with prison)
    plus s. 65 civil ($10K mental anguish) make PHIPA the
    most enforcement-active Ontario regime for AI.

  - Express consent for AI scribes is the IPC's clearest
    interpretive position. This goes beyond PHIPA's general
    deemed-consent framework for HIC activities. The IPC's
    rationale: AI scribes' audio recording + vendor involvement
    + secondary-use risk make implied consent insufficient.

  - The Hospital for Sick Children case (Decision 298, upheld
    in 2025 ONSC 5208) established that email account
    compromise for even one hour triggers PHIPA breach
    notification — the threshold is low. AI scribes accessing
    PHI through compromised vendor systems would similarly
    trigger notification.

  - The "Otter.ai hospital incident" of September 2024
    (unauthorized AI joining virtual hepatology rounds via
    departed-physician calendar invite) is the cautionary tale
    every HIC compliance team references. IPC recommended
    blocking unapproved AI tools at the firewall level. This
    creates a SHADOW AI risk surface that PHIPA custodians
    must manage.

  - Vendor training prohibition is effectively absolute. PHIPA
    permits secondary use only with consent or de-identification
    to "very low" re-identification risk. IPC guidance indicates
    audio recordings almost never meet this standard, so vendors
    cannot use Ontario HIC data to train their models.

  - PHIPA breach notification clock (60 days under O. Reg.
    329/04 s. 12.1) does NOT pause for vendor investigation.
    The custodian's awareness starts the clock. This forces
    custodians to maintain real-time visibility into vendor
    systems.

  - The CPSO Advice (Aug 2025) layers professional-conduct
    obligations on individual physicians: documented use policy,
    patient transparency, verification of every AI note before
    it enters the chart. Failure can trigger College discipline
    separate from PHIPA enforcement.

  - Sentainel's Ontario healthcare go-to-market:
    Operations tier ($2,499/mo) for solo physicians / small
    clinics adopting AI scribes — covers the IPC governance
    expectations.
    Continuous tier ($4,999/mo) for hospitals and FHO/FHN
    group practices — covers full lifecycle monitoring plus
    breach notification orchestration.
  - The IPC has signaled increasing AI focus in its 2024
    annual report and the explicit Bill 194 written submission.
    Expect more guidance documents and likely AMP enforcement
    of AI-related PHIPA breaches through 2026-2027.
