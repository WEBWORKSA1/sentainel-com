summary: |
  PHIPA governs the collection, use, and disclosure of personal
  health information (PHI) by "health information custodians"
  (HICs) in Ontario. The statute predates AI but applies to AI
  systems by operation of its technology-neutral language:
  custodians remain responsible for PHI in their custody or
  control regardless of the processing tool used.

  The IPC released "AI Scribes: Key Considerations for the
  Health Sector" on January 28, 2026 as the first detailed
  interpretive guidance on PHIPA compliance when using AI. The
  guidance is structured around AI scribes (ambient transcription
  tools that capture clinical conversations and generate
  structured notes) but explicitly identifies its expectations
  as a "regulatory baseline" for any clinical AI.

  Eight operational obligations follow from PHIPA + the AI Scribe
  Guidance:

  1. AI GOVERNANCE COMMITTEE (PHIPA s. 10 + Guidance): establish
     a dedicated committee anchored in PHIPA accountability with
     authority to approve, pause, or decommission AI deployments.

  2. PRIVACY IMPACT ASSESSMENT (PHIPA s. 10 + Guidance):
     conduct PIA before deploying AI that handles PHI; update
     PIA through lifecycle.

  3. EXPRESS PATIENT CONSENT (PHIPA s. 18 + Guidance): obtain
     informed express patient consent for AI scribe use,
     including disclosure of recording, vendors, risks, and
     opt-out availability.

  4. DATA MINIMIZATION (PHIPA s. 30 + Guidance): collect, use,
     and retain only the PHI necessary; scrutinize whether full
     audio retention is necessary.

  5. VENDOR DUE DILIGENCE + CONTRACTUAL SAFEGUARDS (PHIPA s. 6
     definition of "agent" + Guidance): comprehensive vendor
     assessment; contracts must include retention limits,
     subcontractor controls, PHIPA breach notification
     commitments, training-data prohibitions, and ongoing
     performance monitoring.

  6. PHIPA BREACH NOTIFICATION (O. Reg. 329/04 s. 12.1): 60-day
     IPC notification clock from custodian awareness of a
     privacy breach. Vendor delays do not pause the clock.

  7. HUMAN OVERSIGHT + CLINICAL ACCOUNTABILITY (CPSO Advice +
     Guidance): physicians retain ultimate clinical
     accountability; verify every AI-generated note before
     it enters the chart; documented use policy.

  8. TRAINING + CONFIDENTIALITY AGREEMENTS (PHIPA s. 12 + s. 17
     + Guidance): training and awareness programs before agents
     access PHI through AI; confidentiality agreements
     acknowledging AI-specific obligations.

  Penalty regime: AMPs up to CAD $50K individual / $500K
  organization under s. 61.1; criminal prosecution up to
  $200K individual (with up to 1 year imprisonment) / $1M
  organization under s. 72; civil action up to $10K mental
  anguish under s. 65 for wilful/reckless misconduct.
scope_description: |
  PHIPA s. 3 "health information custodian" includes:
  - Health care practitioners (regulated and unregulated)
  - Hospitals, psychiatric facilities, independent health
    facilities
  - Long-term care homes
  - Pharmacies
  - Ambulance services
  - Laboratories
  - Specimen collection centres
  - Community care access centres
  - Boards of health
  - The Minister and Ministry of Health
  - The Ontario Health agency
  - Such other persons as may be prescribed

  Scope is broader than EDSTA: PHIPA reaches both public sector
  HICs (hospitals, the Ministry) AND private sector HICs (solo
  family physicians, private clinics, pharmacies). This is the
  major distinction from EDSTA, FIPPA, and MFIPPA which apply
  only to defined public bodies.

  AI scribe applicability: any HIC using ambient AI transcription
  or any AI system processing PHI is subject to the IPC
  guidance and underlying PHIPA obligations. The guidance
  explicitly extends from AI scribes to "any clinical AI."

  CPSO Advice applies to all Ontario physicians regardless of
  practice setting.
extraterritorial_reach: false
extraterritorial_notes: |
  PHIPA applies to HICs located in Ontario and to PHI in their
  custody or control regardless of where the data is processed.
  Cross-border data flows (e.g., US-hosted AI scribe vendors)
  require transfer impact assessment and contractual safeguards
  matching Ontario standards.

  Vendor flow-down: AI scribe vendors serving Ontario HICs are
  effectively bound by PHIPA via contract even if not directly
  subject. The IPC has signaled in multiple decisions that it
  treats vendor non-compliance as custodian non-compliance.
