status_notes: |
  PHIPA itself is in force since 2004 and has been amended
  multiple times (most consequentially in 2020 and the 2024
  amendments adding administrative monetary penalty regime).

  The AI Scribe Guidance is IPC interpretive guidance, not
  statute. However, IPC guidance under PHIPA functions as the
  de facto enforcement standard — non-compliance with IPC
  guidance creates significant risk of IPC order, AMP imposition,
  and reputational exposure.

  The CPSO "Advice to the Profession" on AI in Clinical Practice
  (August 2025) layers professional-conduct obligations on top
  of PHIPA for Ontario physicians using AI.

  Administrative monetary penalties under PHIPA s. 61.1 came
  into force January 1, 2024. The IPC has imposed AMPs in
  multiple cases since (notably Decision 298).
