private_right_of_action_notes: |
  PHIPA s. 65 provides a private right of action where the IPC
  has made an order or issued a report under the Act, or where
  the person was convicted under s. 72.

  Damages: actual damages plus up to $10,000 mental anguish
  damages for wilful or reckless misconduct.

  Class action exposure is real and growing — multiple PHIPA
  class actions have been certified against Ontario hospitals
  for snooping and unauthorized disclosure incidents.
