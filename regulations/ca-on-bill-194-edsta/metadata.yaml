    citation: EDSTA s. 12 + s. 13
    notes: |
      EDSTA s. 12 expressly disclaims private law duty of care:
      "Nothing in the Strengthening Cyber Security and Building
      Trust in the Public Sector Act, 2024, this Act or any
      regulation made or directive issued under this Act
      establishes a private law duty of care owing to any person."

      EDSTA s. 13 further provides: "Failure to comply with this
      Act or any regulation made or directive issued under this
      Act does not affect the validity of any policy, Act,
      regulation, directive, instrument or decision."

      Combined, the statute creates a regulatory-compliance
      obligation without statutory private remedy. Enforcement
      will operate through Minister oversight, accountability
      framework reporting (when prescribed), and inter-government
      directive compliance. Parallel exposure under the Code
      (uncapped damages) and FIPPA (IPC orders) remains intact.
  - tier_name: fippa_ipc_orders
    basis: license_action
    citation: FIPPA s. 49.0.1 (added by Bill 194 Sched. 2)
    notes: |
      The Information and Privacy Commissioner of Ontario gains
      authority under new FIPPA s. 49.0.1 to conduct reviews of
      institution information practices. Combined with the IPC's
      pre-existing order-making powers under FIPPA Part IV, the
      IPC can issue binding orders requiring institutions to
      cease practices, alter policies, or notify affected
      individuals.
private_right_of_action: false
private_right_of_action_notes: |
  EDSTA s. 12 explicitly disclaims any private law duty of care.
  However, complainants are NOT precluded from suing under:
  - The Ontario Human Rights Code (uncapped damages for
    discriminatory AI outcomes — Code primacy)
  - Negligence (independent of EDSTA)
  - Breach of contract (private parties)
  - FIPPA s. 49.0.1 / IPC complaint mechanism (administrative,
    not strictly private)

  Practical effect: EDSTA shields public sector entities from
  EDSTA-derived tort claims, but they remain exposed to all
  ordinary causes of action plus IPC orders.
