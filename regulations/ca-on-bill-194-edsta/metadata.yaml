summary: |
  EDSTA is Canada's first AI-specific statutory framework for the
  public sector. It applies to "public sector entities" — defined
  in s. 1(1) as FIPPA institutions (except the Legislative
  Assembly), MFIPPA institutions, children's aid societies, and
  school boards.

  The EDSTA AI provisions (sections 5–8) impose four operational
  duties on prescribed public sector entities using AI systems in
  prescribed circumstances:

  1. PUBLIC INFORMATION (s. 5(2)): provide information to the
     public about the entity's use of the AI system, in the manner
     prescribed by regulation.

  2. ACCOUNTABILITY FRAMEWORK (s. 5(3)): develop and implement an
     accountability framework respecting the entity's use of AI,
     with form and content prescribed by regulation.

  3. RISK MANAGEMENT (s. 5(4)): take prescribed steps to manage
     risks associated with AI use, which may include reporting
     and record-keeping.

  4. HUMAN OVERSIGHT (s. 6(2)(b)(i)): in prescribed circumstances,
     ensure that an individual exercises oversight of the AI use
     and provides additional information on inquiry.

  Plus two negative duties:
  - PROHIBITED USES (s. 5(6)): not use AI in any manner prohibited
    by regulation.
  - SPECIFIED-PURPOSE USE (s. 5(5)): use AI only for purposes
    prescribed by regulation.

  AI is defined in s. 1(1)(a) using the OECD/NIST-aligned
  formulation: "a machine-based system that, for explicit or
  implicit objectives, infers from the input it receives in order
  to generate outputs such as predictions, content, recommendations
  or decisions that can influence physical or virtual environments."
  Para (b) reserves expansion by regulation.

  Use of AI by public sector entities is broadly construed under
  s. 1(2) to include publicly-available systems, procured systems,
  and systems developed by third parties on behalf of the entity.
  This third-party-flow construction is operationally significant:
  it forces vendor due diligence into the accountability framework.

  EDSTA also (Schedule 1 sections 9–11) enables regulation of
  digital information relating to individuals under age 18 by
  children's aid societies and school boards — Canada's first
  statutory minor-AI framework.

  Schedule 2 amendments to FIPPA add: mandatory written PIAs
  before personal information collection (s. 38(3)), mandatory
  breach notification to the IPC and affected individuals where
  there is a "real risk of significant harm" (s. 40.1), explicit
  safeguard duties (s. 40(5)), IPC investigation power over
  information practices (s. 49.0.1), and whistleblower protection
  (s. 57.1).
scope_description: |
  EDSTA s. 1(1) "public sector entity":
  - FIPPA institutions per s. 2(1) of FIPPA, excluding the
    Legislative Assembly of Ontario
  - MFIPPA institutions per s. 2(1) of MFIPPA
  - Children's aid societies per the Child, Youth and Family
    Services Act, 2017
  - School boards per the Education Act

  This is the broadest possible reach across Ontario's public
  sector: ~600 provincial institutions, ~444 municipal
  institutions, ~49 children's aid societies, ~72 school boards.
  Hospitals and provincial health agencies are captured via FIPPA
  inclusion.

  The AI obligations (s. 5, s. 6) apply only when:
  (a) the entity is "prescribed" by regulation for that section, AND
  (b) the AI use occurs in "prescribed circumstances."

  Until regulations issue, the obligations are dormant.

  Use of AI is construed broadly per s. 1(2): includes use of
  publicly available systems (e.g., ChatGPT), systems procured
  by the entity, and systems developed by third parties on the
  entity's behalf. This is critical for vendor flow-down.
extraterritorial_reach: false
extraterritorial_notes: |
  EDSTA itself applies only to Ontario public sector entities.
  However, vendor flow-down via accountability framework
  requirements (s. 5(3)) will reach private-sector AI vendors
  contracting with Ontario public bodies, regardless of vendor
  jurisdiction. A US AI SaaS vendor selling into the Ontario
  public service must satisfy contractual obligations derived
  from EDSTA even though EDSTA does not directly bind the vendor.

  EDSTA s. 12 expressly disclaims a private law duty of care.
  Customer-side litigation must proceed under other causes of
  action (Code, negligence, breach of contract).
