status_notes: |
  Bill 194 received Royal Assent on November 25, 2024. The EDSTA
  (Schedule 1) and most amendments to FIPPA (Schedule 2) come into
  force on a day to be named by proclamation of the Lieutenant
  Governor (s. 17 EDSTA; respective FIPPA provisions).

  As of May 2026, the EDSTA AI provisions (sections 5, 6, 7, 8)
  remain UN-PROCLAIMED and dependent on Lieutenant Governor in
  Council regulations specifying:
  - which public sector entities are within scope (s. 7(a))
  - which "circumstances" trigger the AI obligations (s. 7(b))
  - the form/content of accountability frameworks (s. 7(d))
  - prescribed risk management steps (s. 7(e))
  - prescribed prohibited AI uses (s. 7(g))
  - technical standards (s. 8)

  Some FIPPA Schedule 2 amendments came into force January 29, 2025
  (whistleblower protections). The mandatory PIA and breach
  notification provisions came into force July 1, 2025.

  Sentainel positions EDSTA as a "horizon" obligation: customers
  in the Ontario public sector or selling into it should begin
  preparing accountability frameworks aligned with NIST AI RMF
  governance functions now, since the statutory shell is in place
  and regulations could be proclaimed with minimal notice.
