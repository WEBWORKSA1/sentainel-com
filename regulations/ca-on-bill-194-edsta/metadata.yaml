safe_harbor_notes: |
  EDSTA contains NO explicit statutory safe harbor. The s. 12
  disclaimer of private law duty of care is the closest the Act
  comes — it limits civil liability but does not provide an
  affirmative defense.

  Practitioner positioning, particularly through the Trustworthy
  AI Framework guidance from the Ontario Cyber Security Centre of
  Excellence and the eventual EDSTA regulations, is widely
  expected to reference NIST AI RMF as the de facto accountability
  framework standard. Entities that align their s. 5(3)
  accountability framework with NIST AI RMF GOVERN function
  controls will be best positioned for whatever regulations
  ultimately prescribe.

  Sentainel positioning: "Build your s. 5(3) accountability
  framework around NIST AI RMF GOVERN-1.1 through GOVERN-6.2.
  When the regulations are proclaimed, you'll be ready in days,
  not months."
notes: |
  - EDSTA is "regulation-empty" at the statutory level. Every
    operational requirement is reserved to s. 7 LGIC regulations
    or s. 8 Minister technical standards. This means:
    (a) the act is a horizon obligation, not an active one
    (b) entities have wide latitude in choosing their
        accountability framework structure
    (c) compliance posture is "be ready" rather than "be done"

  - The AI definition in s. 1(1)(a) is NEAR-IDENTICAL to:
    - NIST AI 100-1 (with minor wording variations)
    - Illinois HRA AI s. 2-101(M)
    - Quebec Law 25 contextual definition
    - EU AI Act art. 3(1)
    This convergence is a strong signal that NIST AI RMF
    cross-mapping will be definitive once Ontario regulations
    issue.

  - The "use" definition in s. 1(2) reaching publicly-available
    AI, procured AI, and third-party-developed AI is critical
    for the vendor risk surface. A public servant using ChatGPT
    to draft a memo is captured. So is a procured SaaS tool.
    Sentainel inventory must capture all three modalities.

  - Children's aid societies and school boards face DUAL
    EDSTA exposure: the public-sector AI obligations under s. 5–6
    AND the minor-information regulations under s. 9–11.
    Operationally these collapse to a single accountability
    framework that handles both.

  - FIPPA s. 38(3) mandatory PIA aligns with the parallel MFIPPA
    Bill 97 amendments. Provincial entities under FIPPA face
    this from July 1, 2025; municipal entities under MFIPPA from
    January 1, 2027.

  - FIPPA s. 40.1 RROSH breach notification threshold matches
    Quebec Law 25 (s. 3.5) and federal PIPEDA. Threshold factors
    in s. 40.1(7) typically include sensitivity, probability of
    misuse, and harm severity.

  - The eventual EDSTA regulations are widely expected (per
    Fasken, BLG, Dentons commentary) to reference the Ontario
    Trustworthy AI Framework as the technical standard for s. 5(3)
    accountability frameworks. The framework explicitly cites
    NIST AI RMF as a foundational reference.

  - Sentainel's Ontario public-sector go-to-market: lead with
    Municipal Edition ($1,499/mo) for MFIPPA institutions, sell
    Operations tier ($2,499/mo) for FIPPA institutions + EDSTA
    readiness, upsell Continuous tier ($4,999/mo) when
    regulations proclaim.
penalty_schedules:
