summary: |
  Quebec Law 25 (formerly Bill 64) is the most stringent privacy
  regime in North America. Modeled on GDPR with adapted French civil
  law concepts, it imposes mandatory privacy impact assessments,
  72-hour breach notification, granular consent requirements, data
  portability rights, automated decision-making transparency, and
  cross-border transfer restrictions.

  For AI: Section 12.1 (automated decision-making transparency) and
  Section 3.3 (mandatory PIAs for processing presenting elevated
  privacy risk) are the operational core. Sections 14 (consent),
  17 (cross-border transfers), and 27 (data portability) add layers
  that materially affect every AI deployment touching Quebec data.

  Strategic significance for Sentainel: Quebec is the most mature
  AI-relevant privacy regime in North America. Penalties exceed
  any US state law. The French-language legislative environment
  creates a natural barrier to US competitors (TXAIMS, CO-AIMS,
  Holistic AI) who do not extract Quebec statutes. Pairs naturally
  with Ontario MFIPPA/Bill 149/Code/PHIPA for cross-Canada
  positioning.
scope_description: |
  Applies to every "person carrying on an enterprise" in Quebec
  that collects, holds, uses, or communicates personal information.
  "Enterprise" is interpreted broadly (Civil Code of Quebec, art. 1525):
  any organized economic activity, including non-profit and most
  professional activities.

  Critically, Law 25 has EXTRATERRITORIAL REACH: an organization
  outside Quebec that collects, uses, or discloses personal
  information of Quebec residents is subject to Law 25. A US SaaS
  company with Quebec users falls under Law 25 even with no Quebec
  physical presence.

  Public sector institutions fall under a parallel statute (Act
  respecting Access to documents held by public bodies and the
  Protection of personal information, CQLR c. A-2.1), also amended
  by Law 25 with similar AI-relevant provisions.
extraterritorial_reach: true
extraterritorial_notes: |
  Confirmed extraterritorial reach. CAI guidance: Law 25 applies
  to any organization collecting, using, or disclosing personal
  information of Quebec residents regardless of where the organization
  is headquartered. Cross-border data transfers under Section 17
  require Privacy Impact Assessment with documented analysis of the
  receiving jurisdiction's protection regime.
safe_harbor_via: []
notes: |
  Law 25 has NO formal statutory safe harbor for AI compliance.
  However, demonstrated alignment with CAI guidance and OECD AI
  Principles provides evidence of "reasonable measures" for due
  diligence defense. Documenting PIAs, governance policies, and
  consent flows is the practical defense against penalties.

  The Charter of Human Rights and Freedoms of Quebec (CQLR c. C-12)
  contains parallel discrimination protections. AI systems producing
  discriminatory outputs in Quebec face Charter complaints in
  addition to Law 25 penalties — similar to Ontario Human Rights
  Code primacy dynamic.

  Quebec is the only Canadian jurisdiction with TWO tiers of fines:
  administrative monetary penalties (AMPs, imposed by CAI without
  court) AND penal sanctions (prosecuted in court). Both can apply
  to the same incident.
