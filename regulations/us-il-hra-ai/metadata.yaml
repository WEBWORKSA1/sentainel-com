  Illinois Human Rights Act AI Amendments — Public Act 103-804
  (HB 3773, 103rd Gen. Assemb. 2024); amends 775 ILCS 5/2-101 and
  775 ILCS 5/2-102 to add definitions of "artificial intelligence"
  and "generative artificial intelligence" (s. 2-101(M)-(N)) and
  to make AI-driven employment discrimination plus failure to
  notify employees of AI use a civil rights violation (s. 2-102(L)).
