private_right_of_action: true
private_right_of_action_notes: |
  Indirectly yes — through the IHRA complaint mechanism. A charge
  is filed with IDHR; if IDHR finds substantial evidence the
  matter goes to the Illinois Human Rights Commission OR (more
  commonly post-2021 amendments) the complainant may elect to
  proceed in circuit court (775 ILCS 5/7A-102(C-1)).

  This is procedurally different from a direct private right of
  action but functionally equivalent — Illinois employees can sue
  their employers under HRA AI through the Commission or in court.

  CRITICAL: BIPA (a companion statute) has a DIRECT private right
  of action with statutory damages ($1,000 / $5,000 per
  violation). Employers using AI hiring tools that involve any
  biometric processing face concurrent BIPA exposure with
  meaningfully larger damages than HRA AI alone.
