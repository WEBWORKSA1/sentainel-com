summary: |
  HB 3773 is Illinois's first AI-specific civil rights law. It
  imposes two related but distinct duties on employers:

  1. SUBSTANTIVE PROHIBITION (s. 2-102(L)(1)): employers may not
     use AI that has the effect of subjecting employees to
     discrimination on the basis of protected classes, and may not
     use zip codes as a proxy for protected classes. The phrase
     "has the effect" is critical — Illinois reaches DISPARATE
     IMPACT, not just intent. This is the operationally significant
     gap between Illinois and Texas TRAIGA (which requires intent
     under s. 552.056(c)).

  2. PROCEDURAL DUTY (s. 2-102(L)(2)): employers must notify
     employees when AI is used for the covered employment decisions.
     The statute does not specify the form, content, or timing of
     notice — those terms are delegated to IDHR rulemaking.

  Scope of covered employment decisions (s. 2-102(L)(1)):
    - recruitment
    - hiring
    - promotion
    - renewal of employment
    - selection for training or apprenticeship
    - discharge
    - discipline
    - tenure
    - terms, privileges, or conditions of employment

  Protected classes (per s. 2-101 incorporation): race, color,
  religion, national origin, ancestry, age, sex, marital status,
  order of protection status, disability, military status, sexual
  orientation, pregnancy, unfavorable discharge from military
  service, citizenship status, work authorization status, family
  responsibilities, reproductive health decisions.

  Strategic significance for Sentainel: Illinois closes the
  "TRAIGA loophole" for hiring AI. A national employer that
  built a Texas-compliant hiring tool (intent-based, narrow harm
  set) faces strict-liability-style disparate-impact exposure the
  moment a Chicago applicant interacts with it. Sentainel's
  classification engine must flag deployments that span IL and
  TX since the compliance posture diverges.

  This regulation pairs cleanly with Ontario Bill 149 (AI hiring
  job-posting disclosure) and AIVIA (Illinois video-interview AI
  consent) to anchor an "AI hiring compliance" sub-vertical.
scope_description: |
  HRA AI applies to: any "employer," "employment agency," or
  "labor organization" as defined in 775 ILCS 5/2-101(A)-(C).
  "Employer" includes any person employing 15 or more employees
  within Illinois during 20 or more calendar weeks within the
  calendar year (s. 2-101(B)(1)(a)) — and any person employing
  one or more employees when a complainant alleges sexual
  harassment or pregnancy discrimination (s. 2-101(B)(1)(d)).
  State and local government employers are also covered
  (s. 2-101(B)(1)(b)).

  Notably broader than TRAIGA on small employers: the 15-employee
  threshold means almost all national employers with Illinois
  staff are in scope.

  Definition of AI is broad and tracks NIST AI 100-1 conceptually
  (s. 2-101(M)): "a machine-based system that, for explicit or
  implicit objectives, infers, from the input it receives, how to
  generate outputs such as predictions, content, recommendations,
  or decisions that can influence physical or virtual
  environments. Artificial intelligence includes generative
  artificial intelligence."

  Generative AI is separately defined (s. 2-101(N)) and covers
  text, image, multimedia, and other simulated-human-produced
  outputs.

  Position-based scope: the statute uses "employees" and
  "employer," not "Illinois residents." Practical effect: a
  Chicago-based employee of a Delaware company falls under HRA AI;
  a Texas resident telecommuting for an Illinois-headquartered
  employer is governed by Illinois law via the employer's nexus.
extraterritorial_reach: false
extraterritorial_notes: |
  The IHRA generally applies to the employment relationship of
  Illinois-based workers regardless of where the employer is
  headquartered. HRA AI inherits this framing. It does not
  explicitly reach extraterritorially the way TRAIGA § 551.002 or
  Quebec Law 25 do — but in practice, almost any employer that
  has Illinois-based employees (the typical situation) is reached.

  No protected-effects reach beyond employment relationships.
  Illinois residents who are merely consumers of AI products are
  not covered by HRA AI (they may be covered by other Illinois
  laws such as BIPA for biometric data).
