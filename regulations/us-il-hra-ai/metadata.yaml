safe_harbor_notes: |
  HRA AI contains NO explicit statutory safe harbor. Unlike TRAIGA
  § 552.105(e)(2)(D), Illinois did not write NIST AI RMF compliance
  into the statute as an affirmative defense.

  HOWEVER, the legal community treats NIST AI RMF substantial
  compliance as good-faith evidence in IDHR investigations and
  defensive litigation. Specifically:

  - IDHR rulemaking is expected (and proposed rules suggest) to
    cite NIST AI RMF as a benchmark for "reasonable" AI use
  - Disparate-impact defense in IHRA cases historically allows
    "business necessity" justification; rigorous fairness testing
    aligned with NIST MEASURE-2.11 strengthens that defense
  - Illinois courts have not yet adjudicated an HRA AI case;
    early defendants who can show NIST AI RMF documentation will
    set persuasive precedent

  Sentainel positioning: package this as "Illinois doesn't grant
  you the safe harbor — but if you have the same NIST documentation
  you'd need for Texas, you have the strongest available defense
  for an Illinois case too." This is the cross-jurisdiction value
  the matrix communicates.
notes: |
  - HRA AI is a CIVIL RIGHTS VIOLATION, not a standalone AI
    statute. This routes enforcement through the Illinois
    Department of Human Rights complaint process (775 ILCS 5/7A)
    rather than a new agency.

  - Disparate impact under HRA AI: the statutory phrase "has the
    effect of subjecting employees to discrimination" is
    materially different from TRAIGA's intent-based standard
    (Tex. Bus. & Comm. Code § 552.056(c): "Disparate impact is
    not sufficient by itself to demonstrate an intent to
    discriminate"). Illinois plaintiffs can build a case on
    statistical disparities alone. This is a major exposure
    differential customers need to model.

  - Zip code proxy prohibition: a notable example of Illinois
    going further than federal law. Title VII jurisprudence allows
    facially neutral criteria that have disparate impact unless
    plaintiff makes a prima facie case; HRA AI specifically
    forbids zip codes outright when used as a proxy. This forces
    deployer-side feature audits.

  - Notice content is undefined: the statute requires notice but
    doesn't specify what the notice must say, in what form, or
    when. This is the biggest interpretive gap. IDHR rulemaking
    will fill it. Sentainel should generate notice-template
    drafts that satisfy the most likely IDHR rules and revise
    upon publication.

  - 1-year+ enforcement statute of limitations: 2 years to file
    a charge with IDHR (recently extended from 300 days per
    775 ILCS 5/7A-102(A)(1)).

  - The Illinois Automated Decision Tools Act (HB 5116) is
    pending; it would impose impact-assessment duties on
    "deployers." Track separately — not enacted as of
    May 2026, but high probability of passage in 2027 session.

  - Companion exposure: Illinois employers running AI-based hiring
    tools face concurrent exposure under HRA AI, AIVIA (if video
    interviews), and BIPA (if biometric data including facial
    geometry from video). The three statutes layer: HRA AI for
    discrimination, AIVIA for procedure and consent, BIPA for
    biometric collection. BIPA carries a private right of action
    with $1,000–$5,000 per violation, the most aggressive damages
    regime in this stack.

  - Enforcement is not yet active: IDHR has issued proposed rules
    but has not closed the rulemaking. First enforcement cases
    likely Q3–Q4 2026.
