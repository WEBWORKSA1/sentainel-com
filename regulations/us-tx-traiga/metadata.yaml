safe_harbor_notes: |
  Section 552.105(e)(2)(D) creates an affirmative defense for any
  defendant who "substantially complies with the most recent version
  of the 'Artificial Intelligence Risk Management Framework:
  Generative Artificial Intelligence Profile' published by the
  National Institute of Standards and Technology or another
  nationally or internationally recognized risk management framework
  for artificial intelligence systems, an internal review process."

  This is the most operationally valuable provision in TRAIGA from
  Sentainel's perspective: substantial NIST AI RMF compliance =
  affirmative defense. The framework cited specifically is the
  NIST AI RMF GenAI Profile (NIST-AI-600-1, July 2024), though
  the section also accepts "another nationally or internationally
  recognized risk management framework" — opening ISO/IEC 42001
  as an alternative safe harbor.

  Additional rebuttable presumption of reasonable care under
  s. 552.105(c) applies generally — burden shifts to plaintiff
  to prove unreasonable conduct.

  Defenses also available under s. 552.105(e):
  - Third-party misuse of the AI system
  - Discovery of violation through feedback, adversarial testing,
    red-team testing, or following state agency guidelines
notes: |
  - TRAIGA replaces an earlier draft that was broader; the enacted
    version is far more deferential to industry.
  - The 60-day cure period under s. 552.104 is uniquely generous
    among state AI laws — most state regimes (e.g., the Colorado
    proposal) had similar cure periods that were stripped or
    sunsetted. Texas retains it.
  - "Disparate impact is not sufficient by itself to demonstrate
    an intent to discriminate" (s. 552.056(c)) is a major
    industry-friendly provision. Plaintiffs cannot use statistical
    disparities alone — they must show intent. This dramatically
    narrows discrimination claims compared to Title VII federal
    employment law.
  - Insurance entities are carved out of s. 552.056 if subject to
    Texas Insurance Code (s. 552.056(d)).
  - Federally insured financial institutions are deemed compliant
    with s. 552.056 if they comply with federal/state banking
    regulations (s. 552.056(e)).
  - Sandbox participants enjoy 36-month testing windows with
    most state law waived, but cannot waive Subchapter B duties
    (s. 553.051(e)).
  - The Texas AI Council (Ch. 554) is advisory only; it cannot
    issue binding rules (s. 554.103). This limits TRAIGA's
    evolution via agency rulemaking — amendments require
    legislative action.
  - HB 149 § 9 contains a "subject to appropriation" clause:
    state agency duties under the Act are contingent on funding.
    Practical effect: AG enforcement may be slow to ramp.
penalty_schedules:
