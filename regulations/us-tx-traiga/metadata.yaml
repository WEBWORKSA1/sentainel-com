private_right_of_action: false
private_right_of_action_notes: |
  Section 552.101(b) is unambiguous: "This chapter does not provide
  a basis for, and is not subject to, a private right of action for
  a violation of this chapter or any other law."

  This is a SIGNIFICANT differentiator from Quebec Law 25 (which
  grants minimum $1,000 CAD per individual class actions). TRAIGA
  is AG-only enforcement. Class action exposure under TRAIGA is
  zero. Customers facing TRAIGA exposure need to model against
  AG enforcement priorities, not consumer class actions.
