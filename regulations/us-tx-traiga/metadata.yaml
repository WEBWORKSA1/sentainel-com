    notes: |
      Applies to violations the court determines to be curable AND
      breaches of cure statements submitted to the AG under
      s. 552.104(b)(2). Note: the cure period itself (s. 552.104)
      means most curable violations never reach penalty if cured
      within 60 days.
  - tier_name: uncurable_violation
    basis: per_violation
    min_amount: 80000
    max_amount: 200000
    currency: USD
    citation: Tex. Bus. & Comm. Code § 552.105(a)(2)
    notes: |
      Applies to violations the court determines to be uncurable.
      Per-violation basis means high-volume systems (e.g., AI
      affecting thousands of Texans) face multiplied exposure.
  - tier_name: continuing_violation
    basis: per_day
    min_amount: 2000
    max_amount: 40000
    currency: USD
    citation: Tex. Bus. & Comm. Code § 552.105(a)(3)
    notes: |
      Daily penalty for each day a violation continues. Stacks on
      top of the underlying violation penalty.
