summary: |
  TRAIGA establishes Texas's AI regulatory framework via four new
  chapters of the Business & Commerce Code:

  - Chapter 551: General provisions (definitions, scope, purpose)
  - Chapter 552: Duties and prohibitions on AI use + enforcement
  - Chapter 553: AI Regulatory Sandbox Program (DIR-administered,
    36-month testing exemption)
  - Chapter 554: Texas AI Council (advisory body, no rulemaking
    authority)

  CRITICAL FOR EXTRACTION ACCURACY: The final HB 149 is significantly
  narrower than its earlier drafts. Several Subchapter B provisions
  apply ONLY to GOVERNMENTAL ENTITIES, not private sector deployers:

  - s. 552.051 (consumer disclosure): governmental agencies only
    (plus a separate healthcare-provider duty in (f))
  - s. 552.053 (social scoring): governmental entities only
  - s. 552.054 (biometric data capture): governmental entities only
    (private sector reached via existing s. 503.001 cross-reference)

  Sections that apply broadly to all persons developing or deploying
  AI in Texas:
  - s. 552.052 (manipulation of human behavior - intent-based)
  - s. 552.055 (constitutional protection - sole-intent test)
  - s. 552.056 (unlawful discrimination - intent-based, not
    disparate impact)
  - s. 552.057 (sexually explicit content / child sexual abuse
    material - sole-intent test)

  Most-cited media descriptions of TRAIGA as a "sweeping consumer
  disclosure law" are inaccurate. The actual private-sector
  consumer-disclosure duty (the kind Colorado proposed) was
  stripped from the final bill. The actual private-sector duties
  in TRAIGA are intent-based prohibitions on a narrow set of harms.

  Strategic significance for Sentainel: TRAIGA is the load-bearing
  US state AI law currently enforceable. Its NIST AI RMF safe harbor
  (s. 552.105(e)(2)(D)) is the cross-jurisdictional anchor — once a
  customer documents NIST AI RMF substantial compliance, they get
  an affirmative defense in Texas, which Sentainel can map to all
  other jurisdictions through the NIST cross-reference matrix.
scope_description: |
  TRAIGA applies to any person who:
    (1) promotes, advertises, or conducts business in Texas;
    (2) produces a product or service used by Texas residents; or
    (3) develops or deploys an AI system in Texas.
        (Tex. Bus. & Comm. Code § 551.002)

  "Consumer" is defined narrowly: a Texas resident "acting only in
  an individual or household context." Employment and commercial
  context interactions are EXCLUDED from the consumer definition
  (s. 551.001(2)) — meaning TRAIGA's consumer disclosure duties
  do not capture B2B AI or HR-tech AI in the way Colorado and
  Illinois do.

  Local preemption: TRAIGA supersedes any municipal or county AI
  regulation (s. 552.003). Texas cities cannot impose stricter
  rules.

  TRAIGA does NOT apply during sandbox testing if the testing is
  authorized under Ch. 553 — EXCEPT that Subchapter B duties
  (552.051-052.057) are explicitly non-waivable for sandbox
  participants (s. 553.051(e)).
extraterritorial_reach: true
extraterritorial_notes: |
  Confirmed extraterritorial reach via § 551.002. A non-Texas entity
  that "produces a product or service used by residents of this
  state" is subject to TRAIGA. This is geography-of-effect, not
  geography-of-location — mirroring how Quebec Law 25 reaches
  US enterprises with Quebec users.

  Practical effect: most national SaaS and consumer-facing products
  fall within scope simply by having Texas users. AG enforcement
  reach across state lines remains untested but the statutory
  language is broad.
safe_harbor_via:
