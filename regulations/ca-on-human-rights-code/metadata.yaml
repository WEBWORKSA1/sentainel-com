summary: |
  The Ontario Human Rights Code prohibits discrimination in employment,
  housing, services, contracts, and vocational associations on 17
  protected grounds. The Code has PRIMACY over all other Ontario
  statutes — all other Ontario laws must be aligned with the Code.

  For AI: the Code is the practical exposure ceiling for discriminatory
  AI outcomes. Section 9 prohibits indirect discrimination, capturing
  AI tools that produce disparate impact even without intent. Damages
  are UNCAPPED. Enforcement is through the Human Rights Tribunal of
  Ontario (HRTO).
scope_description: |
  Applies to all persons, employers, service providers, housing
  providers, and contracting parties in Ontario. Geography-based and
  has primacy over other Ontario statutes.
extraterritorial_reach: false
safe_harbor_via: []
notes: |
  The Code has no statutory affirmative defense for AI. The bona fide
  occupational requirement (BFOR) defense exists for employment but
  is a high bar. Demonstrating substantial alignment with NIST AI RMF
  is helpful evidence of good faith but not a complete defense.
