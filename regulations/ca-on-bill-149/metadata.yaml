summary: |
  Ontario's Bill 149 (Working for Workers Four Act, 2024) introduces
  Part III.1 to the Employment Standards Act, 2000, creating new
  obligations for publicly advertised job postings. AI-specific
  requirements: mandatory disclosure when AI is used to screen,
  assess, or select applicants. Disclosure-based regime; no
  affirmative defense mechanism. Stacks with Ontario Human Rights
  Code for discrimination exposure.
scope_description: |
  Applies to employers with 25 or more employees in Ontario on the
  day a publicly advertised job posting is made. Geography-based:
  applies to any employer hiring for positions in Ontario, regardless
  of where the employer is headquartered.
extraterritorial_reach: true
extraterritorial_notes: |
  Applies to non-Ontario employers (including US companies) hiring
  for Ontario-based positions.
safe_harbor_via: []
notes: |
  Ontario has NO statutory affirmative defense for AI compliance,
  unlike Texas TRAIGA's NIST safe harbor. The Bill is disclosure-
  based, not risk-based. However, demonstrated alignment with NIST
  AI RMF / ISO 42001 still helps defend against parallel Human
  Rights Code complaints (which carry the real discrimination teeth
  in Ontario).
