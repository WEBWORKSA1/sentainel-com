aggregate:
  obligations_count: 17
  avg_controls_per_obligation: 4.8
  highest_leverage_controls:
    - control: GOVERN-1.1
      obligations_covered: 17
      coverage_levels: [fully_satisfies × 17]
    - control: MEASURE-2.10
