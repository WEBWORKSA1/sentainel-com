    - control: MEASURE-2.7
      obligations_covered: 7
    - control: MAP-1.1
      obligations_covered: 5
    - control: GOVERN-6.1
      obligations_covered: 4

  quebec_specific_controls_not_in_base_nist:
    # These obligations have unique Quebec elements not directly
    # mappable to NIST controls — they require Quebec-specific
    # Sentainel module overlays
    - obligation: ca-qc-law-25-s14-consent
      gap: |
        Quebec s. 14 specificity requirements (one-purpose-at-a-time,
        separate from other terms, in clear language) require
        Quebec-specific consent template generator beyond NIST.
    - obligation: ca-qc-law-25-s17-cross-border-transfers
      gap: |
        Quebec adequacy assessment must specifically consider
        legal framework of receiving jurisdiction. NIST third-party
        controls don't include this depth.
    - obligation: ca-qc-law-25-biometric-database-disclosure
      gap: |
        60-day CAI pre-notification is a Quebec-unique procedural
        step with no NIST counterpart.
    - obligation: ca-qc-law-25-s23-anonymization-standard
      gap: |
        Quebec's irreversibility standard with expert supervision
        is stricter than typical NIST guidance.

  combined_coverage_with_tx_traiga:
    # When customer faces BOTH Texas TRAIGA and Quebec Law 25:
    obligations_count: 29
    unique_nist_controls_needed: 28
    overlap_efficiency: |
      ~80% of NIST controls implemented for TRAIGA also
      satisfy Quebec Law 25 obligations. Cross-border
      compliance is roughly 1.2x the work of single-jurisdiction
      compliance, not 2x.
