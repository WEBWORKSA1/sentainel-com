# NIST AI RMF → Quebec Law 25 Cross-Reference Mapping
# Generated: 2026-05-13
# Purpose: Map each Law 25 obligation to NIST AI RMF controls.
# Law 25 does NOT have an explicit safe harbor for NIST AI RMF
# compliance, but CAI guidance and Quebec privacy practitioners
# accept NIST AI RMF + ISO 42001 as evidence of good-faith
# risk management, particularly for s. 3.3 PIA requirements.

regulation: ca-qc-law-25
framework: us-federal-nist-ai-rmf
safe_harbor_basis: |
  No explicit safe harbor under Law 25. However, NIST AI RMF
  substantial compliance + Quebec-specific overlay constitutes
  best-practice evidence for:
  - Section 3.3 mandatory PIA (NIST controls map directly to
    PIA elements)
  - Section 3.2 governance framework (NIST GOVERN controls)
  - Section 12.1 automated decision-making (NIST MAP + MEASURE
    + MANAGE controls)
  - Section 17 cross-border PIA (NIST risk assessment controls)

  CAI has not issued a formal recognition of NIST AI RMF, but
  the framework's risk-management approach aligns with CAI's
  "accountability + privacy by design" expectations. Practitioner
  consensus (Fasken, Norton Rose, BCF) treats NIST AI RMF
  documentation as material evidence of compliance posture.

