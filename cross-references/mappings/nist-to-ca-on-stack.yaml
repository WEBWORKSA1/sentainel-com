    - control: MEASURE-2.10
      obligations_covered: 4
    - control: MANAGE-4.1
      obligations_covered: 5

  ontario_specific_gaps:
    - obligation: ca-on-human-rights-code-s9
      gap: |
        Ontario applies "adverse impact" / disparate-impact standard
        for AI bias (unlike TRAIGA's intent-only test). Customer
        operating in both jurisdictions must comply with stricter
        Ontario standard.
    - obligation: ca-on-bill-149-esa-8-4
      gap: |
        Ontario Bill 149 ESA disclosure has specific job-posting
        language requirements not directly mappable to NIST.
    - obligation: ca-on-mfippa-pia-mandatory-bill97
      gap: |
        MFIPPA PIA requires specific Ontario IPC format elements
        beyond NIST PIA structure.
    - obligation: ca-on-bill-194-edsta-s5-3-accountability-framework
      gap: |
        Operational content reserved to LGIC regulations (un-proclaimed).
        Until regulations issue, customer accountability framework
        should align to NIST AI RMF GOVERN function as the
        practitioner-recognized baseline.
    - obligation: ca-on-phipa-express-patient-consent
      gap: |
        Patient-facing consent script with vendor identification + opt-out
        + risk/benefit disclosure has no NIST equivalent. PHIPA-specific
        artifact required.
    - obligation: ca-on-phipa-breach-notification-60day
      gap: |
        60-day notification clock from custodian awareness is strict and
        does not pause for vendor investigation. Operational clock-tracking
        beyond NIST.
    - obligation: ca-on-phipa-human-oversight-clinical-accountability
      gap: |
        CPSO Advice requires per-note physician verification — a
        clinical accountability layer that extends beyond NIST MAP-3.5
        human oversight.

  cross_jurisdiction_summary:
    # When a customer operates in Texas + Quebec + Ontario + Illinois:
    total_obligations_v1: 59
    unique_nist_controls_needed: 58
    base_nist_controls_count: 46
    coverage_percentage: 85
    interpretation: |
      Implementing the high-leverage NIST AI RMF controls (top 10
      controls cover ~85% of obligations) plus jurisdiction-specific
      overlays (Code disparate impact, Bill 149 job-posting templates,
      MFIPPA PIA format, EDSTA proclamation-readiness, PHIPA patient
      consent + breach clock + CPSO verification) satisfies obligations
      across:
      - Texas TRAIGA (12 obligations)
      - Quebec Law 25 (17 obligations)
      - Ontario Bill 149 + Code + MFIPPA + EDSTA + PHIPA (22 obligations)
      - Illinois HRA AI + AIVIA (8 obligations)

      This is the single most important compliance insight for
      mid-market enterprises operating across US-Canada:
      one workstream, four jurisdictions of coverage, with PHIPA
      providing the strongest enforcement teeth ($500K AMPs + $1M
      criminal + $10K civil) and EDSTA providing the longest
      compliance runway (un-proclaimed AI provisions).
