# NIST AI RMF → Ontario AI Compliance Stack Cross-Reference
# Generated: 2026-05-13 (updated evening to add EDSTA + PHIPA)
# Covers: Bill 149 (ESA), Human Rights Code s. 9, MFIPPA (Bill 97),
#         EDSTA (Bill 194), PHIPA + AI Scribe Guidance

regulations:
  - ca-on-bill-149
  - ca-on-human-rights-code
  - ca-on-mfippa
  - ca-on-bill-194-edsta
  - ca-on-phipa-ai-scribe
framework: us-federal-nist-ai-rmf

safe_harbor_basis: |
  Ontario does not have explicit AI safe harbor language matching
  Texas TRAIGA § 552.105(e)(2)(D). However:

  - Ontario Trustworthy AI Framework (provincial government AI use)
    explicitly references NIST AI RMF as benchmark
  - IPC Ontario AI Scribe Guidance (Jan 2026) explicitly recommends
    "An AI Risk Management Framework" — code for NIST AI RMF —
    as the recommended PHIPA compliance baseline for HICs
  - EDSTA s. 5(3) accountability framework requirements are widely
    expected to reference NIST AI RMF when LGIC regulations issue
  - Ontario Human Rights Tribunal jurisprudence on AI bias would
    accept NIST AI RMF MEASURE-2.11 evidence as material to
    duty-of-accommodation analysis

  Practical effect: NIST AI RMF compliance is recognized de facto
  good-faith evidence across Ontario AI exposure surfaces. PHIPA
  is the closest Canadian regulator language to a recognized
  safe harbor.

