# NIST AI Risk Management Framework 1.0 — Full Control Catalog
# Source: NIST AI 100-1, January 2023 (base framework)
#         NIST AI 600-1, July 2024 (GenAI Profile)
# This file is the canonical control list. All cross-reference
# mappings use these IDs verbatim.

framework:
  slug: us-federal-nist-ai-rmf
  short_name: NIST AI RMF
  full_name: |
    Artificial Intelligence Risk Management Framework (AI RMF 1.0)
    plus Generative AI Profile (NIST-AI-600-1)
  version: 1.0 + GenAI Profile July 2024
  issuing_body: National Institute of Standards and Technology
  framework_type: voluntary_standard
  source_urls:
    - https://www.nist.gov/itl/ai-risk-management-framework
    - https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf
    - https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf
  status: current_recognized_standard
  used_as_safe_harbor_in:
    - us-tx-traiga § 552.105(e)(2)(D)
    - colorado-sb-26-189 (replacing SB 24-205)
    - illinois-hra-ai (recognized framework reference)

# ==============================================================
# GOVERN — 14 controls
# Cultivate a culture of risk management
# ==============================================================
govern:
  - id: GOVERN-1.1
    title: Legal & regulatory requirements managed
    description: |
      Legal and regulatory requirements involving AI are
      understood, managed, and documented.
    iso_42001_equivalent: 5.1, 5.4
  - id: GOVERN-1.2
    title: Characteristics of trustworthy AI integrated
    description: |
      The characteristics of trustworthy AI are integrated into
      organizational policies, processes, procedures, and
      practices.
    iso_42001_equivalent: 5.2, 6.1.1
  - id: GOVERN-1.3
    title: Risk management processes appropriate
    description: |
      Processes, procedures, and practices are in place to
      determine the needed level of risk management activities
      based on the organization's risk tolerance.
    iso_42001_equivalent: 6.1.2
  - id: GOVERN-1.4
    title: Risk management process documented
    description: |
      The risk management process and outcomes are established
      through transparent policies, procedures, and other
      controls based on organizational risk priorities.
    iso_42001_equivalent: 7.5
  - id: GOVERN-1.5
    title: Risk management ongoing oversight
    description: |
      Ongoing monitoring and periodic review of the risk
      management process and its outcomes are planned.
    iso_42001_equivalent: 9.1, 9.2, 9.3
  - id: GOVERN-1.6
    title: Mechanisms for inventory
    description: |
      Mechanisms are in place to inventory AI systems and are
      resourced according to organizational risk priorities.
    iso_42001_equivalent: A.6.2.2
  - id: GOVERN-1.7
    title: Decommissioning procedures
    description: |
      Processes and procedures are in place for decommissioning
      and phasing out of AI systems safely and in a manner that
      does not increase risks or decrease the organization's
      trustworthiness.
    iso_42001_equivalent: A.6.2.8
  - id: GOVERN-2.1
    title: Roles, responsibilities, lines of communication
    description: |
      Roles and responsibilities and lines of communication
      related to mapping, measuring, and managing AI risks are
      documented and are clear to individuals and teams
      throughout the organization.
    iso_42001_equivalent: 5.3
  - id: GOVERN-2.2
    title: Workforce training
    description: |
      The organization's personnel and partners receive AI risk
      management training to enable them to perform their duties
      and responsibilities consistent with related policies,
      procedures, and agreements.
    iso_42001_equivalent: 7.2, 7.3
  - id: GOVERN-2.3
    title: Executive leadership accountability
    description: |
      Executive leadership of the organization takes
      responsibility for decisions about risks associated with
      AI system development and deployment.
    iso_42001_equivalent: 5.1
  - id: GOVERN-3.1
    title: Diversity & inclusion in risk management
    description: |
      Decision-making related to mapping, measuring, and managing
      AI risks throughout the lifecycle is informed by a diverse
      team.
    iso_42001_equivalent: A.6.2.5
  - id: GOVERN-3.2
    title: Inclusive practices for impacted communities
    description: |
      Policies and procedures are in place to define and
      differentiate roles and responsibilities for human-AI
      configurations and oversight of AI systems.
    iso_42001_equivalent: A.6.2.5
  - id: GOVERN-4.1
    title: Risk management practices documented
    description: |
      Organizational policies and practices are in place to
      foster a critical thinking and safety-first mindset.
    iso_42001_equivalent: A.5.2
  - id: GOVERN-4.2
    title: Organizational teams document risks
    description: |
      Organizational teams document the risks and potential
      impacts of the AI technology they design, develop, deploy,
      evaluate, and use.
    iso_42001_equivalent: A.6.2.2, A.6.2.3
  - id: GOVERN-4.3
    title: Testing, identification, information sharing
    description: |
      Organizational practices are in place to enable AI testing,
      identification of incidents, and information sharing.
    iso_42001_equivalent: A.6.2.7, A.7
  - id: GOVERN-5.1
    title: Stakeholder feedback mechanisms
    description: |
      Organizational policies and practices are in place to
      collect, consider, prioritize, and integrate feedback from
      those external to the team that developed or deployed the
      AI system regarding the potential individual and societal
      impacts related to AI risks.
    iso_42001_equivalent: A.6.2.6, 4.2
  - id: GOVERN-5.2
    title: Periodic feedback evaluation
    description: |
      Mechanisms are established to enable the team that developed
      or deployed AI systems to regularly incorporate adjudicated
      feedback from relevant AI actors into system design and
      implementation.
    iso_42001_equivalent: 8.3, 10.2
  - id: GOVERN-6.1
    title: Third-party policies & procedures
    description: |
      Policies and procedures are in place that address AI risks
      associated with third-party entities, including risks of
      infringement of a third party's intellectual property or
      other rights.
    iso_42001_equivalent: A.10
  - id: GOVERN-6.2
    title: Contingency processes
    description: |
      Contingency processes are in place to handle failures or
      incidents in third-party data or AI systems deemed to be
      high-risk.
    iso_42001_equivalent: A.10

# ==============================================================
# MAP — 9 controls
# Establish context and identify AI risks
# ==============================================================
map:
  - id: MAP-1.1
    title: Context of use established
    description: |
      Intended purposes, potentially beneficial uses, context-
      specific laws, norms and expectations, and prospective
      settings in which the AI system will be deployed are
      understood and documented.
    iso_42001_equivalent: 4.1, 4.2, A.6.2.2
  - id: MAP-1.2
    title: Interdisciplinary AI actors identified
    description: |
      Interdisciplinary AI actors, competencies, skills, and
      capacities for establishing context reflect demographic
      diversity and broad domain and user experience expertise.
    iso_42001_equivalent: A.6.2.5
  - id: MAP-1.3
    title: Mission & goals alignment
    description: |
      The organization's mission and relevant goals for AI
      technology are understood and documented.
    iso_42001_equivalent: 5.2
  - id: MAP-1.4
    title: Business value documented
    description: |
      The business value or context of business use has been
      clearly defined or — in the case of assessing existing AI
      systems — re-evaluated.
    iso_42001_equivalent: 4.1
  - id: MAP-1.5
    title: Organizational risk tolerance
    description: |
      Organizational risk tolerances are determined and
      documented.
    iso_42001_equivalent: 6.1.2
  - id: MAP-1.6
    title: System requirements understood
    description: |
      System requirements (e.g., "the system shall respect the
      privacy of its users") are elicited from and understood by
      relevant AI actors.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-2.1
    title: Tasks & methods documented
    description: |
      The specific tasks and methods used to implement the tasks
      that the AI system will support are defined.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-2.2
    title: Knowledge limits documented
    description: |
      Information about the AI system's knowledge limits and how
      system output may be utilized and overseen by humans is
      documented.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-2.3
    title: Scientific integrity & TEVV
    description: |
      Scientific integrity and TEVV (Test, Evaluation,
      Verification, and Validation) considerations are
      identified and documented.
    iso_42001_equivalent: A.6.2.4, A.7
  - id: MAP-3.1
    title: AI capabilities & limitations
    description: |
      Potential benefits of intended AI system functionality and
      performance are examined and documented.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-3.2
    title: Potential costs & risks documented
    description: |
      Potential costs, including non-monetary costs, which result
      from expected or realized AI errors or system functionality
      and trustworthiness — as connected to organizational risk
      tolerance — are examined and documented.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-3.3
    title: Targeted benefits
    description: |
      Targeted application scope is specified and documented
      based on the system's capability, established context, and
      AI system categorization.
    iso_42001_equivalent: A.6.2.4
  - id: MAP-3.4
    title: Processes to enhance/maintain accuracy
    description: |
      Processes for operator and practitioner proficiency with
      AI system performance and trustworthiness are defined,
      assessed, and documented.
    iso_42001_equivalent: A.6.2.5
  - id: MAP-3.5
    title: Human oversight processes
    description: |
      Processes for human oversight are defined, assessed, and
      documented in accordance with organizational policies from
      the GOVERN function.
    iso_42001_equivalent: A.9.2
  - id: MAP-4.1
    title: Approaches to map AI risks
    description: |
      Approaches for mapping AI technology and legal risks of its
      components — including the use of third-party data or
      software — are in place, followed, and documented, as are
      risks of infringement of a third party's intellectual
      property or other rights.
    iso_42001_equivalent: A.10
  - id: MAP-4.2
    title: Internal risk controls
    description: |
      Internal risk controls for components of the AI system,
      including third-party AI technologies, are identified and
      documented.
    iso_42001_equivalent: A.10
  - id: MAP-5.1
    title: Likelihood & magnitude of impact
    description: |
      Likelihood and magnitude of each identified impact (both
      potentially beneficial and harmful) based on expected use,
      past uses of AI systems in similar contexts, public
      incident reports, feedback from those external to the team
      that developed or deployed the AI system, or other data
      are identified and documented.
    iso_42001_equivalent: 6.1.2
  - id: MAP-5.2
    title: Risk practices for assessing/responding to impacts
    description: |
      Practices and personnel for supporting regular engagement
      with relevant AI actors and integrating feedback about
      positive, negative, and unanticipated impacts are in place
      and documented.
    iso_42001_equivalent: 8.3, A.6.2.6

# ==============================================================
# MEASURE — 13 controls (4 categories)
# Analyze, assess, benchmark and monitor AI risk
# ==============================================================
measure:
  - id: MEASURE-1.1
    title: Approaches selected
    description: |
      Approaches and metrics for measurement of AI risks
      enumerated during the MAP function are selected for
      implementation starting with the most significant AI risks.
    iso_42001_equivalent: 9.1
  - id: MEASURE-1.2
    title: Appropriateness of metrics
    description: |
      Appropriateness of AI metrics and effectiveness of existing
      controls are regularly assessed and updated, including
      reports of errors and potential impacts on affected
      communities.
    iso_42001_equivalent: 9.1.3
  - id: MEASURE-1.3
    title: Internal experts
    description: |
      Internal experts who did not serve as front-line developers
      for the system and/or independent assessors are involved
      in regular assessments and updates.
    iso_42001_equivalent: 9.2
  - id: MEASURE-2.1
    title: Test sets, metrics, details
    description: |
      Test sets, metrics, and details about the tools used during
      TEVV are documented.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.2
    title: Evaluations of AI system performance
    description: |
      Evaluations involving human subjects meet applicable
      requirements (including human subject protection) and are
      representative of the relevant population.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.3
    title: Performance evaluation
    description: |
      AI system performance or assurance criteria are measured
      qualitatively or quantitatively and demonstrated for
      conditions similar to deployment setting(s).
    iso_42001_equivalent: A.7
  - id: MEASURE-2.4
    title: Deployment monitoring
    description: |
      The functionality and behavior of the AI system and its
      components — as identified in the MAP function — are
      monitored when in production.
    iso_42001_equivalent: 9.1, A.6.2.7
  - id: MEASURE-2.5
    title: AI system validation
    description: |
      The AI system to be deployed is demonstrated to be valid
      and reliable. Limitations of the generalizability beyond
      the conditions under which the technology was developed
      are documented.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.6
    title: AI system safety
    description: |
      The AI system is evaluated regularly for safety risks — as
      identified in the MAP function. The AI system to be deployed
      is demonstrated to be safe, its residual negative risk does
      not exceed the risk tolerance, and it can fail safely.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.7
    title: AI system security & privacy risks
    description: |
      AI system security and resilience — as identified in the
      MAP function — are evaluated and documented.
    iso_42001_equivalent: A.8
  - id: MEASURE-2.8
    title: AI system transparency
    description: |
      Risks associated with transparency and accountability — as
      identified in the MAP function — are examined and documented.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.9
    title: AI explainability/interpretability
    description: |
      The AI model is explained, validated, and documented, and
      AI system output is interpreted within its context to
      inform responsible use and governance.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.10
    title: Privacy risks
    description: |
      Privacy risk of the AI system — as identified in the MAP
      function — is examined and documented.
    iso_42001_equivalent: A.8
  - id: MEASURE-2.11
    title: Fairness & bias
    description: |
      Fairness and bias — as identified in the MAP function —
      are evaluated and results are documented.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.12
    title: Environmental impact
    description: |
      Environmental impact and sustainability of AI model training
      and management activities — as identified in the MAP
      function — are assessed and documented.
    iso_42001_equivalent: A.7
  - id: MEASURE-2.13
    title: Effectiveness of measurement
    description: |
      Effectiveness of the employed TEVV metrics and processes
      in the MEASURE function are evaluated and documented.
    iso_42001_equivalent: 9.3
  - id: MEASURE-3.1
    title: Risk tracking approaches
    description: |
      Approaches, personnel, and documentation are in place to
      regularly identify and track existing, unanticipated, and
      emergent AI risks based on factors such as intended and
      actual performance in deployed contexts.
    iso_42001_equivalent: 6.1.2
  - id: MEASURE-3.2
    title: Risk tracking documented
    description: |
      Risk tracking approaches are considered for settings where
      AI risks are difficult to assess using currently available
      measurement techniques or where metrics are not yet
      available.
    iso_42001_equivalent: 6.1.2
  - id: MEASURE-3.3
    title: Stakeholder feedback channels
    description: |
      Feedback processes for end users and impacted communities
      to report problems and appeal system outcomes are
      established and integrated into AI system evaluation
      metrics.
    iso_42001_equivalent: A.9.2
  - id: MEASURE-4.1
    title: Measurement approaches reviewed
    description: |
      Measurement approaches for identifying AI risks are
      connected to deployment context(s) and informed through
      consultation with domain experts and other end users.
    iso_42001_equivalent: 9.1, A.9.2
  - id: MEASURE-4.2
    title: Approaches inform changes
    description: |
      Measurement results regarding AI system trustworthiness in
      deployment context(s) and across the AI lifecycle are
      informed by input from domain experts and relevant AI
      actors to validate whether the system is performing
      consistently as intended.
    iso_42001_equivalent: 9.1.3
  - id: MEASURE-4.3
    title: Measurements inform actions
    description: |
      Measurable performance improvements or declines based on
      consultations with relevant AI actors, including affected
      communities, and field data about context-relevant risks
      and trustworthiness characteristics are identified and
      documented.
    iso_42001_equivalent: 9.3

# ==============================================================
# MANAGE — 10 controls (4 categories)
# Allocate risk resources to mapped & measured risks
# ==============================================================
manage:
  - id: MANAGE-1.1
    title: Determination of risk treatment
    description: |
      A determination is made as to whether the AI system
      achieves its intended purposes and stated objectives and
      whether its development or deployment should proceed.
    iso_42001_equivalent: 6.1.3
  - id: MANAGE-1.2
    title: Prioritization of risks
    description: |
      Treatment of documented AI risks is prioritized based on
      impact, likelihood, and available resources or methods.
    iso_42001_equivalent: 6.1.3
  - id: MANAGE-1.3
    title: Decisions inform risk mitigation
    description: |
      Responses to the AI risks deemed high priority — as
      identified by the MAP function — including trade-offs and
      decision processes, are tracked. Risk response options can
      include mitigating, transferring, avoiding, or accepting.
    iso_42001_equivalent: 6.1.3
  - id: MANAGE-1.4
    title: Negative residual risk documented
    description: |
      Negative residual risks (defined as the sum of all
      unmitigated risks) to both downstream acquirers of AI
      systems and end users are documented.
    iso_42001_equivalent: 6.1.3
  - id: MANAGE-2.1
    title: Treatment of risks prioritized
    description: |
      Resources required to manage AI risks are taken into
      account — along with viable non-AI alternative systems,
      approaches, or methods — to reduce the magnitude or
      likelihood of potential impacts.
    iso_42001_equivalent: 6.1.3, A.6.2.4
  - id: MANAGE-2.2
    title: Implement mechanisms
    description: |
      Mechanisms are in place and applied to sustain the value of
      deployed AI systems.
    iso_42001_equivalent: 8.1
  - id: MANAGE-2.3
    title: Superseded AI systems
    description: |
      Procedures are followed to respond to and recover from a
      previously unknown risk when it is identified.
    iso_42001_equivalent: A.6.2.7, A.6.2.8
  - id: MANAGE-2.4
    title: Mechanisms in place
    description: |
      Mechanisms are in place and applied, and responsibilities
      are assigned and understood, to supersede, disengage, or
      deactivate AI systems that demonstrate performance or
      outcomes inconsistent with intended use.
    iso_42001_equivalent: A.6.2.7, A.6.2.8
  - id: MANAGE-3.1
    title: Third-party risks
    description: |
      AI risks and benefits from third-party resources are
      regularly monitored, and risk controls are applied and
      documented.
    iso_42001_equivalent: A.10
  - id: MANAGE-3.2
    title: Pre-trained models
    description: |
      Pre-trained models which are used for development are
      monitored as part of AI system regular monitoring and
      maintenance.
    iso_42001_equivalent: A.10
  - id: MANAGE-4.1
    title: Post-deployment monitoring plans
    description: |
      Post-deployment AI system monitoring plans are implemented,
      including mechanisms for capturing and evaluating input
      from users and other relevant AI actors, appeal and
      override, decommissioning, incident response, recovery,
      and change management.
    iso_42001_equivalent: 9.1, A.6.2.7
  - id: MANAGE-4.2
    title: Measurable activities continual improvement
    description: |
      Measurable activities for continual improvements are
      integrated into AI system updates and include regular
      engagement with interested parties, including relevant AI
      actors.
    iso_42001_equivalent: 10.1, 10.2
  - id: MANAGE-4.3
    title: Incidents communicated
    description: |
      Incidents and errors are communicated to relevant AI
      actors, including affected communities. Processes for
      tracking, responding to, and recovering from incidents and
      errors are followed and documented.
    iso_42001_equivalent: A.6.2.7

# ==============================================================
# GenAI PROFILE (NIST AI 600-1, July 2024)
# 12 cross-cutting risk categories specific to generative AI
# Each category implies application of relevant base controls
# ==============================================================
genai_profile:
  - id: GAI-1
    title: CBRN information or capabilities
    base_controls: [GOVERN-1.1, MAP-5.1, MEASURE-2.6, MANAGE-1.3]
  - id: GAI-2
    title: Confabulation
    base_controls: [MAP-2.2, MEASURE-2.5, MEASURE-2.9]
  - id: GAI-3
    title: Dangerous, violent, or hateful content
    base_controls: [MAP-3.4, MEASURE-2.6, MANAGE-1.3, MANAGE-4.3]
  - id: GAI-4
    title: Data privacy
    base_controls: [MEASURE-2.7, MEASURE-2.10, MANAGE-1.3]
  - id: GAI-5
    title: Environmental impacts
    base_controls: [MAP-3.2, MEASURE-2.12]
  - id: GAI-6
    title: Harmful bias or homogenization
    base_controls: [MEASURE-2.11, MAP-1.2, MANAGE-1.3]
  - id: GAI-7
    title: Human-AI configuration
    base_controls: [MAP-3.5, GOVERN-3.2]
  - id: GAI-8
    title: Information integrity
    base_controls: [MEASURE-2.5, MEASURE-2.9, MANAGE-4.3]
  - id: GAI-9
    title: Information security
    base_controls: [MEASURE-2.7, MANAGE-3.1]
  - id: GAI-10
    title: Intellectual property
    base_controls: [GOVERN-6.1, MAP-4.1, MANAGE-3.1]
  - id: GAI-11
    title: Obscene, degrading, or abusive content
    base_controls: [MEASURE-2.6, MANAGE-1.3, MANAGE-4.3]
  - id: GAI-12
    title: Value chain & component integration
    base_controls: [GOVERN-6.1, GOVERN-6.2, MANAGE-3.1, MANAGE-3.2]
